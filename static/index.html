<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C/C++ Tutor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--panel:#1a1d27;--panel2:#222633;--border:#2a2e3a;
  --accent:#6c8cff;--accent-hover:#5a7aff;--accent-glow:rgba(108,140,255,0.15);
  --highlight:rgba(108,140,255,0.08);--highlight-border:rgba(108,140,255,0.4);
  --changed-bg:rgba(46,204,113,0.1);--changed-border:rgba(46,204,113,0.5);
  --error:#ff5252;--error-bg:rgba(255,82,82,0.08);
  --dim:#5a5e6e;--text:#e1e4ed;--text-secondary:#8b90a0;
  --mono:'SF Mono','Fira Code','JetBrains Mono','Consolas','Monaco',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --radius:8px;--radius-sm:5px;
  --shadow:0 2px 8px rgba(0,0,0,0.3);--shadow-lg:0 4px 20px rgba(0,0,0,0.4);
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

header{background:linear-gradient(135deg,#1a1d27 0%,#1e2235 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-bottom:1px solid var(--border)}
header h1{font-size:17px;font-weight:700;letter-spacing:0.3px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .subtitle{font-size:11px;color:var(--text-secondary);letter-spacing:0.2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}

.top-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.top-bar label{font-size:12px;font-weight:600;color:var(--text-secondary)}
.top-bar input[type=text]{flex:1;min-width:180px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--mono);font-size:12px;background:var(--panel2);color:var(--text);transition:border-color 0.2s}
.top-bar input[type=text]:focus{outline:none;border-color:var(--accent)}
.top-bar input[type=text]::placeholder{color:var(--dim)}
select{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--panel2);color:var(--text);cursor:pointer}
button{padding:6px 16px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-run{background:var(--accent);color:#fff;display:flex;align-items:center;gap:6px}
.btn-run:hover{background:var(--accent-hover);box-shadow:0 0 12px rgba(108,140,255,0.3)}
.btn-run:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none}
.btn-step{background:var(--panel2);color:var(--text-secondary);border:1px solid var(--border)}
.btn-step:hover:not(:disabled){background:var(--panel);color:var(--text);border-color:var(--accent)}
.btn-step:disabled{opacity:0.25;cursor:not-allowed}
.btn-step.active-step{background:var(--accent);color:#fff;border-color:var(--accent)}

.error-bar{background:var(--error-bg);border-bottom:1px solid rgba(255,82,82,0.2);padding:10px 20px;color:var(--error);font-family:var(--mono);font-size:12px;white-space:pre-wrap;max-height:120px;overflow-y:auto;flex-shrink:0;display:none;animation:slideDown 0.2s ease}

.main-area{display:flex;flex:1;overflow:hidden}
.left-panel{width:50%;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.right-panel{width:50%;display:flex;flex-direction:column;overflow:hidden}

.panel-header{background:var(--panel);padding:8px 14px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);flex-shrink:0;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
.panel-header .badge{font-size:10px;font-weight:400;background:var(--accent-glow);color:var(--accent);padding:2px 7px;border-radius:10px;text-transform:none;letter-spacing:0}

.code-editor{flex:1;width:100%;border:none;outline:none;resize:none;padding:14px 16px;font-family:var(--mono);font-size:13px;line-height:1.7;background:var(--panel);color:var(--text);tab-size:4}
.code-editor:focus{outline:none}
.code-editor::placeholder{color:var(--dim)}

.code-container{flex:1;overflow-y:auto;font-family:var(--mono);font-size:13px;line-height:1.7}
.code-line{display:flex;padding:0 16px;min-height:22px;transition:background 0.15s,border-color 0.15s}
.code-line.active{background:var(--highlight);border-left:3px solid var(--accent);padding-left:13px}
.code-line:not(.active){border-left:3px solid transparent;padding-left:13px}
.code-line.active .line-num{color:var(--accent);font-weight:700}
.line-num{color:var(--dim);min-width:36px;text-align:right;margin-right:14px;user-select:none;flex-shrink:0;font-size:12px}
.line-text{white-space:pre;color:var(--text)}

.right-section{flex:1;overflow-y:auto;border-bottom:1px solid var(--border);min-height:0}
.right-section:last-child{border-bottom:none}

.step-desc{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.step-desc .step-icon{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-desc .step-text{font-size:12px;color:var(--text-secondary);line-height:1.4}
.step-desc .step-text strong{color:var(--text);font-weight:600}
.step-desc .step-text code{font-family:var(--mono);color:var(--accent);background:var(--accent-glow);padding:1px 5px;border-radius:3px;font-size:11px}

.frame-card{border-bottom:1px solid var(--border);padding:10px 14px;transition:background 0.15s}
.frame-card:last-child{border-bottom:none}
.frame-card:hover{background:rgba(255,255,255,0.02)}
.frame-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.frame-level{background:var(--accent-glow);color:var(--accent);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.3px}
.frame-func{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.frame-line{color:var(--dim);font-size:11px;margin-left:auto;font-family:var(--mono)}

.var-table{width:100%;font-size:11px;border-collapse:collapse}
.var-table td{padding:3px 8px;font-family:var(--mono);border-top:1px solid var(--border)}
.var-table tr.changed{background:var(--changed-bg);animation:flashChange 0.6s ease}
.var-table tr.changed td{border-top-color:var(--changed-border)}
.var-name{color:#6c8cff;font-weight:600}
.var-type{color:var(--dim);font-size:10px}
.var-value{color:#2ecc71}
.var-table tr.changed .var-value{color:#2ecc71;font-weight:700}

.argv-panel{padding:10px 14px;font-size:12px;background:var(--panel);border-bottom:1px solid var(--border)}
.argv-panel .argv-title{font-weight:700;margin-bottom:6px;color:var(--accent);font-size:12px;display:flex;align-items:center;gap:6px}
.argv-panel .argv-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent)}
.argv-item{display:inline-flex;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:2px 8px;margin:2px;font-family:var(--mono);font-size:11px}
.argv-idx{color:var(--accent);font-weight:700}
.argv-val{color:#2ecc71}

.console-panel{padding:12px 14px;font-family:var(--mono);font-size:12px;min-height:60px;background:#0d1017;color:#a9b7c6;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.console-panel::before{content:'> ';color:var(--dim)}

.controls{background:var(--panel);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.controls .step-info{font-size:12px;color:var(--text-secondary);margin-left:auto;font-family:var(--mono)}
.slider-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:180px}
.slider-wrap input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(108,140,255,0.4)}
.slider-wrap input[type=range]:disabled{opacity:0.3}

.kbd{display:inline-block;font-size:9px;font-family:var(--mono);background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;color:var(--dim);margin-left:2px;line-height:1.2;vertical-align:middle}

.no-data{padding:30px;text-align:center;color:var(--dim);font-size:13px}

@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashChange{0%{background:rgba(46,204,113,0.3)}100%{background:var(--changed-bg)}}
@keyframes spin{to{transform:rotate(360deg)}}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}

.progress-dots{display:flex;gap:3px;align-items:center;max-width:200px;overflow:hidden}
.progress-dot{width:4px;height:4px;border-radius:50%;background:var(--border);transition:all 0.15s;flex-shrink:0}
.progress-dot.active{background:var(--accent);width:12px;height:4px;border-radius:2px}
.progress-dot.visited{background:var(--accent);opacity:0.4}

@media(max-width:800px){
  .main-area{flex-direction:column}
  .left-panel,.right-panel{width:100%;height:50%}
  .left-panel{border-right:none;border-bottom:1px solid var(--border)}
  header .subtitle{display:none}
  .header-right input{width:180px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>C/C++ Tutor</h1>
    <span class="subtitle">Step-by-step execution visualizer</span>
    <div class="header-right">
    </div>
  </header>

  <div class="top-bar">
    <label for="args-input">argv</label>
    <input type="text" id="args-input" placeholder='e.g. hello world  (space or comma separated)'>
    <label for="lang-select">Lang</label>
    <select id="lang-select">
      <option value="c">C</option>
      <option value="cpp">C++</option>
    </select>
    <button class="btn-run" id="btn-run" onclick="runCode()">
      <span id="run-icon">&#9654;</span>
      <span id="run-text">Run</span>
    </button>
  </div>

  <div class="error-bar" id="error-bar"></div>

  <div class="main-area">
    <div class="left-panel">
      <div class="panel-header" id="code-header">
        Source Code
        <span class="badge" id="line-badge" style="display:none"></span>
        <button class="btn-step" id="btn-edit-toggle" onclick="toggleEdit()" style="margin-left:auto;font-size:10px;padding:3px 10px">Edit</button>
      </div>
      <textarea class="code-editor" id="code-editor" spellcheck="false" placeholder="Enter your C/C++ code here...">int main(int argc, char *argv[]) {
    int i;
    for (i = 0; i < argc; i++) {
        write(1, argv[i], 1);
        write(1, " ", 1);
    }
    write(1, "\n", 1);
    return 0;
}</textarea>
      <div class="code-container" id="code-container" style="display:none"></div>
    </div>
    <div class="right-panel">
      <div class="step-desc" id="step-desc" style="display:none">
        <div class="step-icon" id="step-icon">0</div>
        <div class="step-text" id="step-text">Ready</div>
      </div>
      <div class="panel-header">Call Stack &amp; Variables</div>
      <div class="argv-panel" id="argv-panel" style="display:none"></div>
      <div class="right-section" id="frames-container">
        <div class="no-data">Run code to see the call stack</div>
      </div>
      <div class="panel-header">Console Output</div>
      <div class="console-panel" id="console-panel"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-step" id="btn-first" onclick="goFirst()" title="First step (Home)">&#x23EE;</button>
    <button class="btn-step" id="btn-prev" onclick="goPrev()" title="Previous step (← or p)">&#x25C0;</button>
    <div class="slider-wrap">
      <input type="range" id="step-slider" min="0" max="0" value="0" oninput="goToStep(+this.value)" disabled>
    </div>
    <button class="btn-step" id="btn-next" onclick="goNext()" title="Next step (→ or n)">&#x25B6;</button>
    <button class="btn-step" id="btn-last" onclick="goLast()" title="Last step (End)">&#x23ED;</button>
    <div class="step-info" id="step-info"></div>
  </div>
</div>

<script>
let traceData = null;
let currentStep = -1;
let prevVars = {};
let editMode = true;

const $ = id => document.getElementById(id);

function parseArgs(raw) {
  if (!raw.trim()) return [];
  if (raw.includes(',')) return raw.split(',').map(s => s.trim()).filter(Boolean);
  return raw.trim().split(/\s+/).filter(Boolean);
}

function toggleEdit() {
  editMode = !editMode;
  if (editMode) {
    $('code-editor').style.display = '';
    $('code-container').style.display = 'none';
    $('btn-edit-toggle').textContent = 'Edit';
  } else {
    $('code-editor').style.display = 'none';
    $('code-container').style.display = '';
    $('btn-edit-toggle').textContent = 'Edit';
    if (traceData) renderCode();
  }
}

async function runCode() {
  const code = $('code-editor').value;
  if (!code.trim()) {
    showError('Please enter some C/C++ code first.');
    return;
  }

  const lang = $('lang-select').value;
  const args = parseArgs($('args-input').value);

  hideError();
  setLoading(true);
  currentStep = -1;
  prevVars = {};
  traceData = null;

  editMode = false;
  $('code-editor').style.display = 'none';
  $('code-container').style.display = '';
  $('code-container').innerHTML = '<div class="no-data"><span class="spinner"></span>&nbsp; Compiling and tracing...</div>';

  try {
    const resp = await fetch('/api/trace', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, lang, args }),
    });
    if (!resp.ok) {
      showError('Backend returned error ' + resp.status);
      setLoading(false);
      editMode = true;
      $('code-editor').style.display = '';
      $('code-container').style.display = 'none';
      return;
    }
    const data = await resp.json();

    if (!data.success) {
      showError(data.error || 'Unknown error');
      setLoading(false);
      editMode = true;
      $('code-editor').style.display = '';
      $('code-container').style.display = 'none';
      return;
    }

    traceData = data;
    $('step-desc').style.display = 'flex';
    renderCode();
    renderArgv();
    updateControls();
    goToStep(0);
  } catch (e) {
    showError('Network error: ' + e.message);
    editMode = true;
    $('code-editor').style.display = '';
    $('code-container').style.display = 'none';
    $('step-desc').style.display = 'none';
  } finally {
    setLoading(false);
  }
}

function showError(msg) {
  $('error-bar').style.display = 'block';
  $('error-bar').textContent = msg;
}
function hideError() {
  $('error-bar').style.display = 'none';
}

function setLoading(on) {
  $('btn-run').disabled = on;
  $('run-icon').innerHTML = on ? '<span class="spinner" style="width:10px;height:10px;border-width:1.5px"></span>' : '&#9654;';
  $('run-text').textContent = on ? 'Running...' : 'Run';
}

function renderCode() {
  const container = $('code-container');
  if (!traceData || !traceData.source_lines) {
    container.innerHTML = '<div class="no-data">No source</div>';
    return;
  }

  const lines = traceData.source_lines;
  const activeLine = currentStep >= 0 && traceData.steps[currentStep]
    ? traceData.steps[currentStep].line : 0;

  let html = '';
  for (let i = 0; i < lines.length; i++) {
    const lineNum = i + 1;
    const active = lineNum === activeLine ? ' active' : '';
    html += `<div class="code-line${active}" id="codeline-${lineNum}">`
      + `<span class="line-num">${lineNum}</span>`
      + `<span class="line-text">${escHtml(lines[i])}</span></div>`;
  }
  container.innerHTML = html;

  if (activeLine > 0) {
    const el = $('codeline-' + activeLine);
    if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function renderArgv() {
  const panel = $('argv-panel');
  if (!traceData || !traceData.argv || traceData.argv.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  let html = '<div class="argv-title">argc = ' + traceData.argv.length + '</div>';
  traceData.argv.forEach((v, i) => {
    html += `<span class="argv-item"><span class="argv-idx">argv[${i}]</span> <span class="argv-val">"${escHtml(v)}"</span></span>`;
  });
  panel.innerHTML = html;
}

function renderStepDesc() {
  if (!traceData || currentStep < 0 || currentStep >= traceData.steps.length) {
    $('step-desc').style.display = 'none';
    return;
  }
  $('step-desc').style.display = 'flex';
  const step = traceData.steps[currentStep];
  $('step-icon').textContent = currentStep + 1;

  let parts = [];
  if (step.line > 0) parts.push(`<strong>line ${step.line}</strong>`);
  if (step.func && step.func !== '???') parts.push(`in <code>${escHtml(step.func)}</code>`);
  if (step.finished) parts.push('<span style="color:#2ecc71">Program finished</span>');

  let desc = parts.join(' &middot; ');
  if (step.output_delta) {
    desc += `<br><span style="color:#a9b7c6">stdout: "${escHtml(step.output_delta.trim())}"</span>`;
  }
  $('step-text').innerHTML = desc || 'Step ' + (currentStep + 1);
}

function renderFrames() {
  const container = $('frames-container');
  if (!traceData || currentStep < 0 || currentStep >= traceData.steps.length) {
    container.innerHTML = '<div class="no-data">Run code to see the call stack</div>';
    return;
  }

  const step = traceData.steps[currentStep];
  if (!step.frames || step.frames.length === 0) {
    container.innerHTML = '<div class="no-data">' + (step.finished ? 'Program finished' : 'No stack frames') + '</div>';
    return;
  }

  let html = '';
  const frames = [...step.frames].reverse();
  for (const frame of frames) {
    html += `<div class="frame-card">`;
    html += `<div class="frame-header">`;
    html += `<span class="frame-level">${frame.level === 0 ? 'main' : 'frame ' + frame.level}</span>`;
    html += `<span class="frame-func">${escHtml(frame.func)}</span>`;
    html += `<span class="frame-line">:${frame.line || '?'}</span>`;
    html += `</div>`;

    if (frame.vars && frame.vars.length > 0) {
      html += `<table class="var-table">`;
      for (const v of frame.vars) {
        const key = `${frame.level}:${v.name}`;
        const changed = prevVars[key] !== undefined && prevVars[key] !== v.value;
        html += `<tr class="${changed ? 'changed' : ''}">`;
        html += `<td class="var-name">${escHtml(v.name)}</td>`;
        html += `<td class="var-type">${escHtml(v.type)}</td>`;
        html += `<td class="var-value">${escHtml(v.value)}</td>`;
        html += `</tr>`;
      }
      html += `</table>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

function renderConsole() {
  const panel = $('console-panel');
  if (!traceData || currentStep < 0 || currentStep >= traceData.steps.length) {
    panel.textContent = '';
    return;
  }
  const step = traceData.steps[currentStep];
  panel.textContent = step.output_so_far || '';
}

function renderProgress() {
  const total = traceData ? traceData.steps.length : 0;
  if (total === 0) { $('step-info').innerHTML = ''; return; }

  const dots = [];
  const maxShow = 30;
  const step = Math.max(1, Math.floor(total / maxShow));
  for (let i = 0; i < total; i += step) {
    let cls = 'progress-dot';
    if (i === currentStep) cls += ' active';
    else if (i < currentStep) cls += ' visited';
    dots.push(`<span class="${cls}"></span>`);
  }
  if (total <= maxShow) {
    for (let i = dots.length; i < total; i++) {
      let cls = 'progress-dot';
      if (i === currentStep) cls += ' active';
      else if (i < currentStep) cls += ' visited';
      dots.push(`<span class="${cls}"></span>`);
    }
  }

  $('step-info').innerHTML =
    `<span style="margin-right:8px">Step ${currentStep + 1} / ${total}</span>` +
    `<span class="progress-dots">${dots.join('')}</span>`;
}

function updateControls() {
  const total = traceData ? traceData.steps.length : 0;
  $('btn-first').disabled = total === 0 || currentStep <= 0;
  $('btn-prev').disabled = total === 0 || currentStep <= 0;
  $('btn-next').disabled = total === 0 || currentStep >= total - 1;
  $('btn-last').disabled = total === 0 || currentStep >= total - 1;

  const slider = $('step-slider');
  slider.max = Math.max(0, total - 1);
  slider.value = currentStep >= 0 ? currentStep : 0;
  slider.disabled = total === 0;

  renderProgress();
}

function goToStep(n) {
  if (!traceData) return;
  const total = traceData.steps.length;
  if (n < 0) n = 0;
  if (n >= total) n = total - 1;

  if (currentStep >= 0 && currentStep < traceData.steps.length) {
    prevVars = {};
    const step = traceData.steps[currentStep];
    for (const frame of (step.frames || [])) {
      for (const v of (frame.vars || [])) {
        prevVars[`${frame.level}:${v.name}`] = v.value;
      }
    }
  }

  currentStep = n;
  renderCode();
  renderStepDesc();
  renderFrames();
  renderConsole();
  updateControls();
}

function goFirst() { goToStep(0); }
function goPrev() { goToStep(currentStep - 1); }
function goNext() { goToStep(currentStep + 1); }
function goLast() { goToStep(traceData ? traceData.steps.length - 1 : 0); }

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' || e.key === 'n') goNext();
  else if (e.key === 'ArrowLeft' || e.key === 'p') goPrev();
  else if (e.key === 'Home') goFirst();
  else if (e.key === 'End') goLast();
  else if (e.key === 'Enter' && e.ctrlKey) runCode();
});

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
