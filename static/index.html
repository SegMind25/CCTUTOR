<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C/C++ Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font-sans:'Inter',system-ui,-apple-system,sans-serif;--font-mono:'Fira Code','Source Code Pro','Consolas',monospace;--radius:8px;--radius-sm:5px;--gap:16px;--pad:12px}
[data-theme="dark"]{--bg:#1E1E2E;--panel:#2A2A3C;--panel2:#33334D;--border:#3A3A50;--header-bg:#2A2A3C;--footer-bg:#2A2A3C;--code-bg:#282A36;--code-text:#F8F8F2;--line-num:#6272A4;--line-active-bg:rgba(255,255,0,0.15);--line-executed-bg:rgba(0,255,0,0.08);--output-bg:#000;--output-text:#00FF00;--stack-bg:#1A3A5C;--stack-border:#89B4FA;--heap-bg:#3A2A1A;--heap-border:#FAB387;--btn-primary:#89B4FA;--btn-primary-hover:#74C7EC;--btn-text:#1E1E2E;--text-primary:#CDD6F4;--text-secondary:#A6ADC8;--text-dim:#6C7086;--error:#F38BA8;--error-bg:rgba(243,139,168,0.1);--success:#A6E3A9;--accent:#89B4FA;--accent-glow:rgba(137,180,250,0.15);--changed-bg:rgba(166,227,169,0.12);--ptr-color:#FAB387;--addr-color:#CBA6F7;--type-color:#6C7086;--shadow:0 2px 8px rgba(0,0,0,0.3);--slider-track:#45475A;--slider-thumb:#89B4FA;--modal-overlay:rgba(0,0,0,0.6);
  --syn-keyword:#CBA6F7;--syn-type:#89B4FA;--syn-string:#A6E3A9;--syn-number:#FAB387;--syn-comment:#6C7086;--syn-func:#89DCEB;--syn-preproc:#F38BA8;--syn-op:#89DCEB;--syn-bracket:#F9E2AF;--syn-param:#EBA0AC;
}
[data-theme="light"]{--bg:#FFFFFF;--panel:#F5F5F5;--panel2:#EEEEEE;--border:#E0E0E0;--header-bg:#F0F0F0;--footer-bg:#E8E8E8;--code-bg:#FAFAFA;--code-text:#212121;--line-num:#999;--line-active-bg:rgba(255,255,0,0.12);--line-executed-bg:rgba(0,128,0,0.05);--output-bg:#000;--output-text:#00FF00;--stack-bg:#E3F2FD;--stack-border:#2196F3;--heap-bg:#FFF3E0;--heap-border:#FF9800;--btn-primary:#2196F3;--btn-primary-hover:#1976D2;--btn-text:#FFF;--text-primary:#212121;--text-secondary:#757575;--text-dim:#999;--error:#F44336;--error-bg:rgba(244,67,54,0.08);--success:#4CAF50;--accent:#2196F3;--accent-glow:rgba(33,150,243,0.1);--changed-bg:rgba(76,175,80,0.1);--ptr-color:#E65100;--addr-color:#7B1FA2;--type-color:#999;--shadow:0 2px 8px rgba(0,0,0,0.08);--slider-track:#BDBDBD;--slider-thumb:#2196F3;--modal-overlay:rgba(0,0,0,0.3);
  --syn-keyword:#7C3AED;--syn-type:#2563EB;--syn-string:#16A34A;--syn-number:#EA580C;--syn-comment:#9CA3AF;--syn-func:#0891B2;--syn-preproc:#DC2626;--syn-op:#0891B2;--syn-bracket:#D97706;--syn-param:#BE123C;
}
html,body{height:100%;font-family:var(--font-sans);background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
html[dir="rtl"] #app{direction:rtl}

/* Header */
.hdr{background:var(--header-bg);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.hdr h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),#CBA6F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-center{display:flex;align-items:center;gap:8px;margin-left:16px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
select{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-sans);background:var(--panel2);color:var(--text-primary);cursor:pointer}
.btn-icon{width:32px;height:32px;border:none;border-radius:var(--radius-sm);background:var(--panel2);color:var(--text-primary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;border:1px solid var(--border)}
.btn-icon:hover{background:var(--accent);color:var(--btn-text);border-color:var(--accent)}

/* Main */
.main{display:flex;flex:1;overflow:hidden;gap:0}
.left{width:58%;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.right{width:42%;display:flex;flex-direction:column;overflow:hidden}

/* Panels */
.ph{background:var(--panel);padding:6px 14px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);flex-shrink:0;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
.ph .dot{width:6px;height:6px;border-radius:50%}
.ph .dot.stack{background:var(--stack-border)}.ph .dot.heap{background:var(--heap-border)}.ph .dot.vars{background:var(--accent)}.ph .dot.out{background:var(--success)}

/* Code Editor */
.ed{flex:1;width:100%;border:none;outline:none;resize:none;padding:12px 14px 12px 50px;font-family:var(--font-mono);font-size:13px;line-height:1.6;background:var(--code-bg);color:var(--code-text);tab-size:4;white-space:pre;overflow:auto}
.ed:focus{outline:none}.ed::placeholder{color:var(--text-dim)}

/* Syntax highlighted code display */
.code-wrap{flex:1;overflow:auto;background:var(--code-bg);position:relative}
.code-line{display:flex;min-height:21px;padding:0 14px 0 0;position:relative;transition:background .12s}
.code-line.current{background:var(--line-active-bg)}
.code-line.executed{background:var(--line-executed-bg)}
.line-gutter{min-width:48px;padding:0 12px 0 10px;text-align:right;color:var(--line-num);font-family:var(--font-mono);font-size:12px;line-height:1.6;user-select:none;flex-shrink:0;border-right:1px solid var(--border)}
.code-line.current .line-gutter{color:var(--accent);font-weight:700}
.line-code{flex:1;padding-left:14px;font-family:var(--font-mono);font-size:13px;line-height:1.6;white-space:pre;color:var(--code-text)}
.line-arrow{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
.line-arrow.go{background:var(--accent)}
.line-arrow.done{background:var(--success)}
.line-arrow.stop{background:var(--error)}

/* Syntax tokens */
.kw{color:var(--syn-keyword);font-weight:500}
.ty{color:var(--syn-type)}
.st{color:var(--syn-string)}
.nu{color:var(--syn-number)}
.cm{color:var(--syn-comment);font-style:italic}
.fn{color:var(--syn-func)}
.pp{color:var(--syn-preproc)}
.op{color:var(--syn-op)}
.br{color:var(--syn-bracket)}
.pm{color:var(--syn-param)}

/* Right panels */
.r-scroll{flex:1;overflow-y:auto;min-height:0;border-bottom:1px solid var(--border)}
.sf{border-bottom:1px solid var(--border);padding:6px 10px;font-family:var(--font-mono);font-size:11px;transition:background .12s}
.sf:last-child{border-bottom:none}
.sf.active{background:var(--accent-glow)}
.sf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sf-name{font-weight:700;color:var(--accent);font-size:12px}
.sf-addr{color:var(--addr-color);font-size:10px}
.vr{display:flex;align-items:center;gap:6px;padding:2px 0;border-bottom:1px solid rgba(128,128,128,0.08)}
.vr:last-child{border-bottom:none}
.vr.changed{background:var(--changed-bg);border-radius:3px;padding:2px 4px;animation:flash .4s}
.vr-n{color:var(--accent);font-weight:600;min-width:50px}
.vr-t{color:var(--type-color);min-width:40px;font-size:10px}
.vr-v{color:var(--success);flex:1}
.vr-v.ptr{color:var(--ptr-color)}
.vr-a{color:var(--addr-color);font-size:10px}
.ho{border:1px solid var(--heap-border);border-radius:var(--radius-sm);background:var(--heap-bg);padding:5px 8px;font-family:var(--font-mono);font-size:10px;margin:4px}
.ho-l{font-weight:700;color:var(--text-secondary);margin-bottom:2px;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.ho-v{color:var(--success)}
.out{padding:10px 14px;font-family:var(--font-mono);font-size:13px;min-height:50px;background:var(--output-bg);color:var(--output-text);white-space:pre-wrap;word-break:break-all;line-height:1.6}
.nd{padding:16px;text-align:center;color:var(--text-dim);font-size:12px}

/* Step desc */
.sd{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:flex-start;gap:8px;flex-shrink:0}
.sd-n{width:26px;height:26px;border-radius:50%;background:var(--btn-primary);color:var(--btn-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sd-t{font-size:12px;color:var(--text-secondary);line-height:1.5}
.sd-t strong{color:var(--text-primary)}
.sd-t code{font-family:var(--font-mono);color:var(--accent);background:var(--accent-glow);padding:1px 4px;border-radius:3px;font-size:11px}
.sd-e{font-size:11px;color:var(--text-secondary);margin-top:3px;padding:4px 8px;background:var(--panel2);border-radius:4px;border-left:2px solid var(--accent);line-height:1.4}
.sd-e .mem{display:block;margin-top:2px;color:var(--ptr-color);font-size:10px}

/* Argv */
.av{padding:6px 10px;font-size:11px;background:var(--panel);border-bottom:1px solid var(--border)}
.av-t{font-weight:700;color:var(--accent);margin-bottom:3px;font-size:11px;display:flex;align-items:center;gap:5px}
.av-t::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent)}
.av-i{display:inline-flex;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;margin:2px;font-family:var(--font-mono);font-size:10px}
.av-k{color:var(--accent);font-weight:700}.av-v{color:var(--success)}.av-a{color:var(--addr-color);font-size:9px}

/* Footer */
.ftr{background:var(--footer-bg);border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.ftr .sc{font-size:12px;color:var(--text-secondary);margin-left:auto;font-family:var(--font-mono)}
.sw{display:flex;align-items:center;gap:6px;flex:1;min-width:160px}
.sw input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--slider-track);border-radius:2px;outline:none}
.sw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--slider-thumb);cursor:pointer}
.sw input[type=range]:disabled{opacity:.3}
.bn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;background:var(--panel2);color:var(--text-primary);transition:all .15s}
.bn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.bn:disabled{opacity:.25;cursor:not-allowed}
.pb{height:4px;background:var(--border);border-radius:2px;margin:0 6px;flex:1;overflow:hidden}
.pf{height:100%;background:var(--btn-primary);border-radius:2px;transition:width .2s}
.btn-run{background:var(--btn-primary);color:var(--btn-text);padding:6px 18px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-run:hover{background:var(--btn-primary-hover)}.btn-run:disabled{opacity:.4;cursor:not-allowed}

/* Modal */
.mo{position:fixed;inset:0;background:var(--modal-overlay);display:flex;align-items:center;justify-content:center;z-index:1000}
.mc{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:440px;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.mc h3{font-size:15px;font-weight:700;margin-bottom:4px}.mc p{font-size:12px;color:var(--text-secondary);margin-bottom:14px;line-height:1.5}
.ml{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.mr{display:flex;align-items:center;gap:6px}
.mr label{font-family:var(--font-mono);font-size:11px;color:var(--accent);min-width:50px}
.mr input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:12px;background:var(--panel2);color:var(--text-primary)}
.mr input:focus{outline:none;border-color:var(--accent)}
.ma{background:none;border:1px dashed var(--border);color:var(--text-dim);padding:3px 8px;font-size:11px;width:100%;border-radius:var(--radius-sm);cursor:pointer}
.ma:hover{border-color:var(--accent);color:var(--text-primary)}
.mb{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.mbc{padding:5px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;background:var(--panel2);color:var(--text-secondary)}
.mbr{padding:5px 14px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;background:var(--btn-primary);color:var(--btn-text)}
.mn{font-size:10px;color:var(--text-dim);font-style:italic}

.err{background:var(--error-bg);border-bottom:1px solid var(--error);padding:8px 16px;color:var(--error);font-family:var(--font-mono);font-size:12px;white-space:pre-wrap;max-height:100px;overflow-y:auto;flex-shrink:0;display:none}
@keyframes flash{0%{background:rgba(166,227,169,.3)}to{background:var(--changed-bg)}}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@media(max-width:900px){.main{flex-direction:column}.left,.right{width:100%;height:50%}.left{border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <h1 data-i18n="title">C/C++ Tutor</h1>
    <div class="hdr-center">
      <select id="lang-sel"><option value="c">C</option><option value="cpp">C++</option></select>
      <button class="btn-run" id="btn-run" onclick="runCode()"><span id="ri">&#9654;</span><span id="rt" data-i18n="run">Run</span></button>
    </div>
    <div class="hdr-right">
      <select id="i18n-sel" onchange="setLang(this.value)" title="Language">
        <option value="en">EN</option><option value="zh-CN">中文</option><option value="zh-TW">繁中</option>
        <option value="ja">日本語</option><option value="ko">한국어</option><option value="es">ES</option>
        <option value="fr">FR</option><option value="de">DE</option><option value="pt">PT</option>
        <option value="ru">RU</option><option value="ar">عربي</option><option value="hi">HI</option>
        <option value="it">IT</option><option value="tr">TR</option><option value="vi">VI</option>
      </select>
      <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">&#9789;</button>
    </div>
  </div>
  <div class="err" id="err-bar"></div>
  <div class="main">
    <div class="left">
      <div class="ph"><span data-i18n="sourceCode">Source Code</span><button class="bn" id="btn-edit" onclick="toggleEdit()" style="margin-left:auto;font-size:10px;padding:2px 8px" data-i18n="edit">Edit</button></div>
      <textarea class="ed" id="code-ed" spellcheck="false" placeholder="Enter C/C++ code...">int main(int argc, char *argv[]) {
    int i;
    for (i = 0; i < argc; i++) {
        write(1, argv[i], 1);
        write(1, " ", 1);
    }
    write(1, "\n", 1);
    return 0;
}</textarea>
      <div class="code-wrap" id="code-wrap" style="display:none"></div>
    </div>
    <div class="right">
      <div class="sd" id="step-desc" style="display:none"><div class="sd-n" id="sd-num">0</div><div style="flex:1"><div class="sd-t" id="sd-text" data-i18n="ready">Ready</div><div class="sd-e" id="sd-exp" style="display:none"></div></div></div>
      <div class="ph"><span class="dot vars"></span><span data-i18n="variables">Variables</span></div>
      <div class="av" id="argv-panel" style="display:none"></div>
      <div class="r-scroll" id="frames-box"><div class="nd" data-i18n="runVars">Run code to see variables</div></div>
      <div class="ph"><span class="dot stack"></span><span data-i18n="stack">Stack</span></div>
      <div class="r-scroll" id="stack-box"><div class="nd" data-i18n="runStack">Run code to see stack</div></div>
      <div class="ph"><span class="dot heap"></span><span data-i18n="heap">Heap</span></div>
      <div class="r-scroll" id="heap-box" style="min-height:30px;padding:6px;display:flex;flex-wrap:wrap;gap:4px"><div class="nd" data-i18n="noHeap" style="width:100%">No heap allocations</div></div>
      <div class="ph"><span class="dot out"></span><span data-i18n="output">Output</span></div>
      <div class="out" id="console"></div>
    </div>
  </div>
  <div class="ftr">
    <button class="bn" id="bf" onclick="goFirst()" title="First">&#x23EE;</button>
    <button class="bn" id="bp" onclick="goPrev()" title="Prev">&#x25C0;</button>
    <div class="sw"><input type="range" id="slider" min="0" max="0" value="0" oninput="goTo(+this.value)" disabled></div>
    <button class="bn" id="bnxt" onclick="goNext()" title="Next">&#x25B6;</button>
    <button class="bn" id="bl" onclick="goLast()" title="Last">&#x23ED;</button>
    <div class="pb"><div class="pf" id="pfill" style="width:0%"></div></div>
    <div class="sc" id="scount"></div>
  </div>
</div>
<div class="mo" id="argv-modal" style="display:none"><div class="mc">
  <h3 data-i18n="argvTitle">Program Arguments (argv)</h3>
  <p data-i18n="argvDesc">Your code uses argc/argv. Enter arguments below. argv[0] is automatic.</p>
  <div class="ml" id="argv-list"></div>
  <button class="ma" onclick="addArgv()" data-i18n="addArg">+ Add argument</button>
  <div class="mn" data-i18n="argvNote">First input = argv[1], second = argv[2], etc.</div>
  <div class="mb"><button class="mbc" onclick="closeModal()" data-i18n="cancel">Cancel</button><button class="mbr" onclick="submitModal()">&#9654; <span data-i18n="run">Run</span></button></div>
</div></div>

<script>
/* ══════ i18n ══════ */
const I={
en:{title:"C/C++ Tutor",run:"Run",running:"Running...",edit:"Edit",sourceCode:"Source Code",variables:"Variables",stack:"Stack",heap:"Heap",output:"Output",ready:"Ready",runVars:"Run code to see variables",runStack:"Run code to see stack",noHeap:"No heap allocations",noSource:"No source",compiling:"Compiling...",noCode:"Enter C/C++ code first.",backendErr:"Backend error",netErr:"Network error:",unkErr:"Unknown error",argvTitle:"Program Arguments (argv)",argvDesc:"Your code uses argc/argv. Enter arguments below. argv[0] (program name) is set automatically.",addArg:"+ Add argument",argvNote:"First input = argv[1], second = argv[2], etc.",cancel:"Cancel",finished:"Program finished",noFrames:"No frames",step:"Step",

/* ══════ Syntax Highlighting ══════ */
function highlight(code,lang){
  const KW_C='auto break case const continue default do else enum extern for goto if inline register restrict return sizeof static struct switch typedef union volatile void while _Bool _Complex _Imaginary'.split(' ');
  const KW_CPP='alignas alignof and and_eq asm bitand bitor bool catch char char8_t char16_t char32_t class compl concept const_cast consteval constexpr co_await co_return co_yield decltype delete dynamic_cast explicit export false final friend mutable namespace new noexcept not not_eq nullptr operator or or_eq private protected public reinterpret_cast requires static_assert static_cast template this thread_local throw true try typeid typename using virtual wchar_t xor xor_eq'.split(' ');
  const TY='int char short long float double unsigned signed size_t ssize_t ptrdiff_t uint8_t uint16_t uint32_t uint64_t int8_t int16_t int32_t int64_t FILE FILESIZE_T string vector map set list deque queue stack pair tuple array'.split(' ');
  const KW=lang==='cpp'?[...KW_C,...KW_CPP]:KW_C;
  let r='',i=0;
  while(i<code.length){
    if(code[i]==='/'&&code[i+1]==='/'){let e=code.indexOf('\n',i);if(e<0)e=code.length;r+=`<span class="cm">${esc(code.slice(i,e))}</span>`;i=e;continue;}
    if(code[i]==='/'&&code[i+1]==='*'){let e=code.indexOf('*/',i+2);if(e<0)e=code.length;else e+=2;r+=`<span class="cm">${esc(code.slice(i,e))}</span>`;i=e;continue;}
    if(code[i]==='#'){let e=i;while(e<code.length&&code[e]!=='\n')e++;r+=`<span class="pp">${esc(code.slice(i,e))}</span>`;i=e;continue;}
    if(code[i]==='"'||code[i]==="'"){
      const q=code[i];let j=i+1;while(j<code.length&&code[j]!==q){if(code[j]==='\\')j++;j++;}
      j=Math.min(j+1,code.length);r+=`<span class="st">${esc(code.slice(i,j))}</span>`;i=j;continue;}
    if(/[0-9]/.test(code[i])&&(i===0||/[\s(,;=+\-*/<>!&|^~[\]{}]/.test(code[i-1]))){let j=i;if(code[j]==='0'&&(code[j+1]==='x'||code[j+1]==='X')){j+=2;while(j<code.length&&/[0-9a-fA-F]/.test(code[j]))j++;}else{while(j<code.length&&/[0-9.]/.test(code[j]))j++;if(j<code.length&&(code[j]==='e'||code[j]==='E')){j++;if(j<code.length&&(code[j]==='+'||code[j]==='-'))j++;while(j<code.length&&/[0-9]/.test(code[j]))j++;}if(j<code.length&&/[uUlLfF]/.test(code[j]))j++;}
      r+=`<span class="nu">${esc(code.slice(i,j))}</span>`;i=j;continue;}
    if(/[a-zA-Z_]/.test(code[i])){let j=i;while(j<code.length&&/[a-zA-Z0-9_]/.test(code[j]))j++;const w=code.slice(i,j);
      if(KW.includes(w))r+=`<span class="kw">${esc(w)}</span>`;
      else if(TY.includes(w))r+=`<span class="ty">${esc(w)}</span>`;
      else if(j<code.length&&code[j]==='(')r+=`<span class="fn">${esc(w)}</span>`;
      else if(w==='argc'||w==='argv')r+=`<span class="pm">${esc(w)}</span>`;
      else r+=esc(w);
      i=j;continue;}
    if('+-*/%=!<>&|^~?:'.includes(code[i])){let j=i;while(j<code.length&&'+-*/%=!<>&|^~?:'.includes(code[j]))j++;r+=`<span class="op">${esc(code.slice(i,j))}</span>`;i=j;continue;}
    if('()[]{}'.includes(code[i])){r+=`<span class="br">${esc(code[i])}</span>`;i++;continue;}
    r+=esc(code[i]);i++;}
  return r;}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ══════ Editor Helpers ══════ */
const codeEd=$('code-ed');
codeEd.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=codeEd.selectionStart,en=codeEd.selectionEnd;codeEd.value=codeEd.value.substring(0,s)+'    '+codeEd.value.substring(en);codeEd.selectionStart=codeEd.selectionEnd=s+4;}
  if(e.key==='Enter'){e.preventDefault();const s=codeEd.selectionStart,before=codeEd.value.substring(0,s),after=codeEd.value.substring(codeEd.selectionEnd);const indent=before.match(/\n([ \t]*)/)?.[1]||'';const last=before.trim().slice(-1);let extra=(last==='{')?'\t':'';codeEd.value=before+'\n'+indent+extra+after;codeEd.selectionStart=codeEd.selectionEnd=s+1+indent.length+extra.length;}
  if((e.key==='('||e.key==='{'||e.key==='['||e.key==='"'||e.key==="'")&&e.key.length===1){const pairs={'(':')','{':'}','[':']','"':'"',"'":"'"};const s=codeEd.selectionStart,en=codeEd.selectionEnd;if(s===en){e.preventDefault();const v=codeEd.value;codeEd.value=v.substring(0,s)+e.key+pairs[e.key]+v.substring(en);codeEd.selectionStart=codeEd.selectionEnd=s+1;}
  if((e.key===')'||e.key==='}'||e.key===']')&&codeEd.value[codeEd.selectionStart]===e.key){e.preventDefault();codeEd.selectionStart=codeEd.selectionEnd=codeEd.selectionStart+1;}
  }});

function toggleEdit(){editMode=!editMode;if(editMode){$('code-ed').style.display='';$('code-wrap').style.display='none';$('btn-edit').textContent=t('edit');}else{$('code-ed').style.display='none';$('code-wrap').style.display='';$('btn-edit').textContent=t('edit');if(traceData)renderCode();}}

/* ══════ Argv Modal ══════ */
function openModal(){$('argv-list').innerHTML='';addArgv();addArgv();$('argv-modal').style.display='flex';setTimeout(()=>$('argv-list').querySelector('input')?.focus(),100);}
function closeModal(){$('argv-modal').style.display='none';setLoading(false);}
function addArgv(v){const l=$('argv-list'),i=l.children.length;const r=document.createElement('div');r.className='mr';r.innerHTML=`<label>argv[${i+1}]</label><input type="text" value="${esc(v||'')}" placeholder="arg ${i+1}" onkeydown="if(event.key==='Enter'){event.preventDefault();addArgv()}">`;l.appendChild(r);r.querySelector('input').focus();}
function submitModal(){pendingArgs=[];$('argv-list').querySelectorAll('input').forEach(i=>{const v=i.value.trim();if(v)pendingArgs.push(v)});$('argv-modal').style.display='none';doRun(pendingArgs);}

function hasArgv(c){return/\bargc\b|\bargv\b/.test(c)}
async function runCode(){const c=$('code-ed').value;if(!c.trim()){showErr(t('noCode'));return;}if(hasArgv(c)){openModal();return;}doRun([]);}

async function doRun(args){
  const code=$('code-ed').value,lang=$('lang-sel').value;
  hideErr();setLoading(true);currentStep=-1;prevVars={};traceData=null;editMode=false;
  $('code-ed').style.display='none';$('code-wrap').style.display='';
  $('code-wrap').innerHTML=`<div class="nd"><span class="sp"></span>&nbsp; ${t('compiling')}</div>`;
  try{const r=await fetch('/api/trace',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,lang,args})});
    if(!r.ok){showErr(t('backendErr')+' '+r.status);setLoading(false);editMode=true;$('code-ed').style.display='';$('code-wrap').style.display='none';return;}
    const d=await r.json();if(!d.success){showErr(d.error||t('unkErr'));setLoading(false);editMode=true;$('code-ed').style.display='';$('code-wrap').style.display='none';return;}
    traceData=d;$('step-desc').style.display='flex';renderCode();renderArgv();updateCtrl();goTo(0);
  }catch(e){showErr(t('netErr')+' '+e.message);editMode=true;$('code-ed').style.display='';$('code-wrap').style.display='none';$('step-desc').style.display='none';}
  finally{setLoading(false);}
}

function showErr(m){$('err-bar').style.display='block';$('err-bar').textContent=m;}
function hideErr(){$('err-bar').style.display='none';}
function setLoading(on){$('btn-run').disabled=on;$('ri').innerHTML=on?'<span class="sp" style="width:10px;height:10px;border-width:1.5px"></span>':'&#9654;';$('rt').textContent=on?t('running'):t('run');}

function renderCode(){
  const c=$('code-wrap');if(!traceData||!traceData.source_lines){c.innerHTML=`<div class="nd">${t('noSource')}</div>`;return;}
  const lines=traceData.source_lines,al=currentStep>=0&&traceData.steps[currentStep]?traceData.steps[currentStep].line:0,pl=currentStep>0&&traceData.steps[currentStep-1]?traceData.steps[currentStep-1].line:0;
  const execLines=new Set();if(currentStep>=0)for(let i=0;i<=currentStep;i++)if(traceData.steps[i].line>0)execLines.add(traceData.steps[i].line);
  let h='';for(let i=0;i<lines.length;i++){
    const ln=i+1,isCur=ln===al,isExec=execLines.has(ln)&&!isCur;
    let cls=isCur?'code-line current':isExec?'code-line executed':'code-line';
    let arrow='';if(isCur&&traceData.steps[currentStep]){const s=traceData.steps[currentStep];if(s.finished)arrow='<div class="line-arrow stop"></div>';else if(al>pl&&pl>0)arrow='<div class="line-arrow go"></div>';}
    h+=`<div class="${cls}" id="cl-${ln}">${arrow}<div class="line-gutter">${ln}</div><div class="line-code">${highlight(lines[i],$('lang-sel').value)}</div></div>`;
  }
  c.innerHTML=h;
  if(al>0){const el=$('cl-'+al);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});}
}

function renderArgv(){const p=$('argv-panel');if(!traceData||!traceData.argv||!traceData.argv.length){p.style.display='none';return;}p.style.display='block';let h=`<div class="av-t">argc = ${traceData.argv.length}</div>`;traceData.argv.forEach((v,i)=>{const a='0x'+(0x7ffffff0+i*8).toString(16);h+=`<span class="av-i"><span class="av-k">argv[${i}]</span> <span class="av-v">"${esc(v)}"</span> <span class="av-a">@${a}</span></span>`;});p.innerHTML=h;}

function explainStep(step,lines){
  if(!step||step.finished)return t('finished');
  const lt=(lines&&step.line>0&&step.line<=lines.length)?lines[step.line-1].trim():'';
  let base='';const ltN=step.line||0;
  if(/^\s*for\s*\(/.test(lt))base=t('expFor');
  else if(/^\s*while\s*\(/.test(lt))base=t('expWhile');
  else if(/^\s*if\s*\(/.test(lt))base=t('expIf');
  else if(/^\s*return\b/.test(lt))base=t('expReturn');
  else if(/\bwrite\s*\(/.test(lt))base=t('expWrite');
  else if(/\bprintf\s*\(/.test(lt))base=t('expPrintf');
  else if(/^\s*int\s+\w+\s*=/.test(lt))base=t('expDeclInit');
  else if(/^\s*int\s+\w+/.test(lt))base=t('expDecl');
  else if(/\w+\s*=/.test(lt)&&!/==/.test(lt))base=t('expAssign');
  else base=t('expDefault');
  let mem='';if(step.frames){for(const f of step.frames){if(f.vars){for(const v of f.vars){const key=`${f.level}:${v.name}`;if(prevVars[key]!==undefined&&prevVars[key]!==v.value){mem+=`<span class="mem">${v.name}: ${prevVars[key]} → ${v.value}</span>`;}}}}}
  return base+(mem?mem:'');}

function renderStepDesc(){
  if(!traceData||currentStep<0||currentStep>=traceData.steps.length){$('step-desc').style.display='none';return;}
  $('step-desc').style.display='flex';const s=traceData.steps[currentStep];$('sd-num').textContent=currentStep+1;
  let p=[];if(s.line>0)p.push(`<strong>${t('step')} ${s.line}</strong>`);if(s.func&&s.func!=='???')p.push(`in <code>${esc(s.func)}</code>`);if(s.finished)p.push(`<span style="color:var(--success)">${t('finished')}</span>`);
  let d=p.join(' &middot; ');if(s.output_delta)d+=`<br><span style="color:var(--text-dim)">stdout: "${esc(s.output_delta.trim())}"</span>`;
  $('sd-text').innerHTML=d||`${t('step')} ${currentStep+1}`;
  const ex=explainStep(s,traceData.source_lines);$('sd-exp').innerHTML=ex;$('sd-exp').style.display=ex?'block':'none';
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h);}

function renderFrames(){
  const c=$('frames-box');if(!traceData||currentStep<0||currentStep>=traceData.steps.length){c.innerHTML=`<div class="nd">${t('runVars')}</div>`;return;}
  const s=traceData.steps[currentStep];if(!s.frames||!s.frames.length){c.innerHTML=`<div class="nd">${s.finished?t('finished'):t('noFrames')}</div>`;return;}
  let h='';const frames=[...s.frames].reverse();
  for(const f of frames){
    h+=`<div class="sf${f===frames[0]?' active':''}"><div class="sf-head"><span class="sf-name">${esc(f.func||'???')}</span><span class="sf-addr">0x${(0xbfff0000+f.level*0x100).toString(16)}</span></div>`;
    if(f.vars&&f.vars.length){for(const v of f.vars){const k=`${f.level}:${v.name}`,ch=prevVars[k]!==undefined&&prevVars[k]!==v.value,isPtr=/\*/.test(v.type)||v.value.startsWith('0x');const a='0x'+((0xbfff0000+f.level*0x100+0x20+hashStr(v.name)%0xd0)>>>0).toString(16);
      h+=`<div class="vr${ch?' changed':''}"><span class="vr-n">${esc(v.name)}</span><span class="vr-t">${esc(v.type)}</span><span class="vr-v${isPtr?' ptr':''}">${esc(v.value)}${ch?' →':''}</span><span class="vr-a">@${a}</span></div>`;}}
    h+=`</div>`;}c.innerHTML=h;}

function renderStack(){
  const c=$('stack-box');if(!traceData||currentStep<0||currentStep>=traceData.steps.length){c.innerHTML=`<div class="nd">${t('runStack')}</div>`;return;}
  const s=traceData.steps[currentStep];if(!s.frames||!s.frames.length){c.innerHTML=`<div class="nd">${s.finished?t('finished'):t('noFrames')}</div>`;return;}
  let h='';const frames=[...s.frames].reverse();
  for(const f of frames){const a=0xbfff0000+f.level*0x100,act=f===frames[0];
    h+=`<div class="sf${act?' active':''}"><div class="sf-head"><span class="sf-name">${esc(f.func||'???')}</span><span class="sf-addr">0x${a.toString(16)}</span></div>`;
    if(f.vars&&f.vars.length){for(const v of f.vars){const va='0x'+((a+0x20+hashStr(v.name)%0xd0)>>>0).toString(16),ip=/\*/.test(v.type);
      h+=`<div class="vr"><span class="vr-a">${va}</span><span class="vr-n">${esc(v.name)}</span><span class="vr-v${ip?' ptr':''}">${esc(v.value)}</span></div>`;}}
    h+=`</div>`;}c.innerHTML=h;}

function renderHeap(){
  const c=$('heap-box');if(!traceData||currentStep<0||currentStep>=traceData.steps.length){c.innerHTML=`<div class="nd" style="width:100%">${t('noHeap')}</div>`;return;}
  const s=traceData.steps[currentStep];let h='',ok=false;
  if(s.frames)for(const f of s.frames)if(f.vars)for(const v of f.vars)if(/\*/.test(v.type)&&v.value&&v.value!=='0x0'&&v.value!=='0'&&v.value!=='(nil)'){ok=true;const ta='0x'+((parseInt(v.value,16)||0xc0000000+hashStr(v.name)%0x1000)>>>0).toString(16);h+=`<div class="ho"><div class="ho-l">${esc(v.name)} &#8594;</div><div class="ho-v">@${ta}</div></div>`;}
  c.innerHTML=ok?h:`<div class="nd" style="width:100%">${t('noHeap')}</div>`;}

function renderConsole(){const p=$('console');if(!traceData||currentStep<0||currentStep>=traceData.steps.length){p.textContent='';return;}p.textContent=traceData.steps[currentStep].output_so_far||'';}

function updateCtrl(){
  const n=traceData?traceData.steps.length:0;
  $('bf').disabled=n===0||currentStep<=0;$('bp').disabled=n===0||currentStep<=0;
  $('bnxt').disabled=n===0||currentStep>=n-1;$('bl').disabled=n===0||currentStep>=n-1;
  const sl=$('slider');sl.max=Math.max(0,n-1);sl.value=currentStep>=0?currentStep:0;sl.disabled=n===0;
  $('pfill').style.width=n>0?((currentStep+1)/n*100)+'%':'0%';
  $('scount').textContent=n>0?`${t('step')} ${currentStep+1} / ${n}`:'';}

function goTo(n){
  if(!traceData)return;const tot=traceData.steps.length;if(n<0)n=0;if(n>=tot)n=tot-1;
  if(currentStep>=0&&currentStep<traceData.steps.length){prevVars={};const s=traceData.steps[currentStep];for(const f of(s.frames||[]))for(const v of(f.vars||[]))prevVars[`${f.level}:${v.name}`]=v.value;}
  currentStep=n;renderCode();renderStepDesc();renderFrames();renderStack();renderHeap();renderConsole();updateCtrl();}
function goFirst(){goTo(0);}function goPrev(){goTo(currentStep-1);}
function goNext(){goTo(currentStep+1);}function goLast(){goTo(traceData?traceData.steps.length-1:0);}

document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight'||e.key==='n')goNext();else if(e.key==='ArrowLeft'||e.key==='p')goPrev();
  else if(e.key==='Home')goFirst();else if(e.key==='End')goLast();
  else if(e.key==='Enter'&&e.ctrlKey)runCode();else if(e.key==='Escape')closeModal();});

setLang(getLang());
</script>
